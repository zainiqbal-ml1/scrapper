<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>CanLII PDFs</title>
  <style>
    body {
      font: 13px/1.4 system-ui, sans-serif;
      margin: 12px;
      min-width: 280px;
      color: #111;
    }
    h1 { font-size: 14px; margin: 0 0 8px; }
    .muted { color: #555; font-size: 12px; }
    label { display: block; margin-top: 10px; font-size: 12px; }
    input[type="number"], input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      margin-top: 4px;
      padding: 6px 8px;
    }
    button {
      margin-top: 12px;
      width: 100%;
      padding: 8px 10px;
      font-weight: 600;
      cursor: pointer;
    }
    button.secondary {
      margin-top: 6px;
      font-weight: normal;
    }
    button.resume {
      background: #c77d1a;
      color: #fff;
      border: none;
      border-radius: 6px;
    }
    #status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      background: #f4f4f4;
      font-size: 12px;
      white-space: pre-wrap;
    }
    .err { color: #a00; }
    .ok { color: #060; }
  </style>
</head>
<body>
  <h1>CanLII PDF bulk download</h1>
  <p class="muted" id="page-hint">Open a database page on canlii.org first.</p>

  <label><input type="checkbox" id="allYears" /> Download ALL years (not just current year)</label>

  <label>Tabs per batch
    <input type="number" id="batchSize" value="10" min="1" max="20" step="1" />
  </label>
  <label>Pause between batches (ms)
    <input type="number" id="batchPause" value="3000" min="0" max="60000" step="500" />
  </label>
  <label>Subfolder under Downloads
    <input type="text" id="subfolder" placeholder="canlii/onlrb" />
  </label>
  <label><input type="checkbox" id="skipDone" checked disabled /> Always skip already-downloaded PDFs</label>
  <label><input type="checkbox" id="autoRecover" checked /> After block: prompt New Identity, then auto-reopen page &amp; resume</label>

  <p class="muted">When blocked: you click Tor → New Identity (no extra permissions). Extension reopens your listing and continues. Install permanently with <code>install_tor_extension.sh</code>.</p>

  <button id="resume" class="resume" type="button" style="display:none">Resume download</button>
  <button id="start">Download PDFs</button>
  <button class="secondary" id="cancel" type="button">Cancel / pause</button>

  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
